<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #6ee7b7;
    --text: #e8eaf0;
    --muted: #7b82a0;
    --correct: #22c55e;

    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid #2a2e45;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }
  header h2 {
    font-size: 17px;
    font-weight: 700;
    margin-top: 2px;
  }
  .progress-bar-wrap {
    margin-top: 10px;
    background: #2a2e45;
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    text-align: right;
  }

  /* SECTION SELECTOR */
  .section-nav {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid #1e2235;
  }
  .section-nav::-webkit-scrollbar { display: none; }
  .sec-btn {
    flex-shrink: 0;
    padding: 6px 13px;
    border-radius: 99px;
    border: 1.5px solid #2a2e45;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sec-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .sec-btn.done {
    border-color: var(--correct);
    color: var(--correct);
  }

  /* EXERCISE PANEL */
  .exercise {
    display: none;
    padding: 18px 16px;
    animation: fadeIn 0.25s ease;
  }
  .exercise.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* UNIT TAG */
  .unit-tag {
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .ex-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    line-height: 1.3;
  }

  /* AUDIO PLAYER */
  .audio-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 18px;
    border: 1px solid #2a2e45;
  }
  .audio-wrap audio {
    width: 100%;
    accent-color: var(--accent);
  }
  .audio-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* TEXT WITH BLANKS */
  .passage {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid #2a2e45;
    line-height: 1.9;
    font-size: 15px;
    margin-bottom: 18px;
  }
  .passage p { margin-bottom: 8px; }
  .passage p:last-child { margin-bottom: 0; }

  /* BLANK INPUT */
  .blank-wrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 2px;
  }
  .blank-num {
    font-size: 9px;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 1px;
  }
  .blank-input {
    background: var(--surface2);
    border: 1.5px solid #3a3f5c;
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    padding: 3px 7px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 80px;
    max-width: 140px;
    text-align: center;
  }
  .blank-input:focus { border-color: var(--accent); }
  .blank-input.correct {
    border-color: var(--correct);
    background: #052e16;
    color: var(--correct);
  }
  .blank-input.wrong {
    border-color: var(--wrong);
    background: #2d0a0a;
    color: var(--wrong);
  }

  /* ANSWER REVEAL */
  .answer-reveal {
    display: block;
    font-size: 10px;
    color: var(--correct);
    font-weight: 700;
    margin-top: 2px;
    display: none;
  }
  .answer-reveal.show { display: block; }

  /* SCORE BOX */
  .score-box {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 14px;
    display: none;
    align-items: center;
    gap: 10px;
    border: 1px solid #2a2e45;
  }
  .score-box.show { display: flex; }
  .score-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }
  .score-details { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-check {
    background: var(--accent);
    color: #fff;
  }
  .btn-check:hover { background: #3a7ef0; }
  .btn-next {
    background: var(--accent2);
    color: #0a2015;
    display: none;
  }
  .btn-next.show { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-next:hover { background: #4dd4a0; }
  .btn-reset {
    background: transparent;
    border: 1.5px solid #2a2e45;
    color: var(--muted);
    font-size: 13px;
    flex: 0 0 auto;
    padding: 13px 16px;
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* COMPLETE */
  .complete-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .complete-screen.show { display: block; }
  .complete-icon { font-size: 64px; margin-bottom: 16px; }
  .complete-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .complete-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .btn-restart {
    margin-top: 24px;
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>

// State
const state = {
  current: 0,
  done: new Set(),
  checked: new Set()
};

function buildAll() {
  const nav = document.getElementById('sectionNav');
  const container = document.getElementById('exercises');
  nav.innerHTML = '';
  container.innerHTML = '';

  EXERCISES.forEach((ex, idx) => {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'sec-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = `${idx + 1}`;
    btn.id = `navbtn-${idx}`;
    btn.onclick = () => goTo(idx);
    nav.appendChild(btn);

    // Exercise panel
    const panel = document.createElement('div');
    panel.className = 'exercise' + (idx === 0 ? ' active' : '');
    panel.id = `ex-${idx}`;

    const answers = getAnswers(ex);
    const totalBlanks = answers.length;

    panel.innerHTML = `
      <div class="unit-tag">${ex.unit}</div>
      <div class="ex-title">${ex.title}</div>
      <div class="audio-wrap">
        <audio controls preload="none" id="audio-${idx}">
          <source src="${ex.audio}" type="audio/mpeg">
        </audio>
        <div class="audio-hint">🔊 Listen, then fill in the blanks below</div>
      </div>
      <div class="passage" id="passage-${idx}">${buildPassage(ex, idx)}</div>
      <div class="score-box" id="score-${idx}">
        <div class="score-num" id="score-num-${idx}">0/${totalBlanks}</div>
        <div class="score-details" id="score-details-${idx}"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-reset" onclick="resetEx(${idx})">↺ Reset</button>
        <button class="btn btn-check" id="check-${idx}" onclick="checkEx(${idx})">Check Answers</button>
        <button class="btn btn-next" id="next-${idx}" onclick="goNext(${idx})">Next →</button>
      </div>
    `;
    container.appendChild(panel);
  });

  updateProgress();
}

function getAnswers(ex) {
  const ans = [];
  ex.parts.forEach(p => {
    if (p.blank !== undefined) ans.push({ num: p.blank, answer: p.text });
  });
  return ans.sort((a, b) => a.num - b.num);
}

function buildPassage(ex, idx) {
  let html = '';
  ex.parts.forEach(p => {
    if (p.blank !== undefined) {
      const width = Math.max(80, p.text.length * 9 + 20);
      html += `
        <span class="blank-wrap" id="wrap-${idx}-${p.blank}">
          <span class="blank-num">${p.blank}</span>
          <input class="blank-input" id="inp-${idx}-${p.blank}"
            type="text" autocomplete="off" autocorrect="off" spellcheck="false"
            style="width:${Math.min(width, 140)}px"
            placeholder="…">
          <span class="answer-reveal" id="reveal-${idx}-${p.blank}"></span>
        </span>`;
    } else {
      // Plain text — handle newlines
      html += p.text.replace(/\n/g, '<br>');
    }
  });
  return html;
}

function checkEx(idx) {
  const ex = EXERCISES[idx];
  const answers = getAnswers(ex);
  let correct = 0;

  answers.forEach(({ num, answer }) => {
    const inp = document.getElementById(`inp-${idx}-${num}`);
    const reveal = document.getElementById(`reveal-${idx}-${num}`);
    if (!inp) return;

    const userVal = inp.value.trim().toLowerCase();
    const correctVal = answer.trim().toLowerCase();

    if (userVal === correctVal) {
      inp.classList.add('correct');
      inp.classList.remove('wrong');
      reveal.classList.remove('show');
      correct++;
    } else {
      inp.classList.add('wrong');
      inp.classList.remove('correct');
      reveal.textContent = `✓ ${answer}`;
      reveal.classList.add('show');
    }
    inp.disabled = true;
  });

  const total = answers.length;
  const scoreBox = document.getElementById(`score-${idx}`);
  const scoreNum = document.getElementById(`score-num-${idx}`);
  const scoreDetails = document.getElementById(`score-details-${idx}`);

  scoreBox.classList.add('show');
  scoreNum.textContent = `${correct}/${total}`;
  scoreNum.style.color = correct === total ? 'var(--correct)' : correct >= total / 2 ? 'var(--accent)' : 'var(--wrong)';

  if (correct === total) {
    scoreDetails.textContent = '🎉 Perfect score! Great listening!';
  } else if (correct >= total / 2) {
    scoreDetails.textContent = `Good job! ${total - correct} wrong answer${total - correct > 1 ? 's' : ''} — check the red ones above.`;
  } else {
    scoreDetails.textContent = `Keep practicing! ${total - correct} wrong answer${total - correct > 1 ? 's' : ''} — review the red ones above.`;
  }

  document.getElementById(`check-${idx}`).style.display = 'none';
  state.checked.add(idx);

  const nextBtn = document.getElementById(`next-${idx}`);
  if (idx < EXERCISES.length - 1) {
    nextBtn.classList.add('show');
    nextBtn.innerHTML = 'Next Exercise →';
  } else {
    nextBtn.classList.add('show');
    nextBtn.innerHTML = '🏁 Finish';
  }

  if (correct === total) {
    state.done.add(idx);
    document.getElementById(`navbtn-${idx}`).classList.add('done');
    updateProgress();
  }
}

function resetEx(idx) {
  const ex = EXERCISES[idx];
  const answers = getAnswers(ex);
  answers.forEach(({ num }) => {
    const inp = document.getElementById(`inp-${idx}-${num}`);
    const reveal = document.getElementById(`reveal-${idx}-${num}`);
    if (inp) {
      inp.value = '';
      inp.classList.remove('correct', 'wrong');
      inp.disabled = false;
    }
    if (reveal) reveal.classList.remove('show');
  });
  document.getElementById(`score-${idx}`).classList.remove('show');
  document.getElementById(`check-${idx}`).style.display = '';
  const nextBtn = document.getElementById(`next-${idx}`);
  nextBtn.classList.remove('show');
  state.checked.delete(idx);
}

function goNext(idx) {
  if (idx < EXERCISES.length - 1) {
    goTo(idx + 1);
  } else {
    // Show complete
    document.querySelectorAll('.exercise').forEach(e => e.classList.remove('active'));
    document.getElementById('completeScreen').classList.add('show');
    updateProgress();
  }
}

function goTo(idx) {
  document.querySelectorAll('.exercise').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('completeScreen').classList.remove('show');

  document.getElementById(`ex-${idx}`).classList.add('active');
  document.getElementById(`navbtn-${idx}`).classList.add('active');

  // Scroll nav button into view
  const navBtn = document.getElementById(`navbtn-${idx}`);
  navBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  state.current = idx;
  updateProgress();

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const total = EXERCISES.length;
  const pct = Math.round(((state.current + 1) / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${state.current + 1} / ${total}`;
}

function restartAll() {
  state.current = 0;
  state.done.clear();
  state.checked.clear();
  buildAll();
  document.getElementById('completeScreen').classList.remove('show');
  goTo(0);
}

buildAll();
</script>
